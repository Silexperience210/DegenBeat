name: Build Firmwares

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sunton:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        pip install platformio
    
    - name: Build Sunton ESP32-2432S028R
      run: |
        pio run -e sunton-2432s028r
    
    - name: Create merged firmware
      run: |
        mkdir -p release
        esptool.py --chip esp32 merge-bin \
          -o release/degenbeat-sunton-2432s028r-merged.bin \
          --flash-mode dio --flash-size 4MB \
          0x1000 .pio/build/sunton-2432s028r/bootloader.bin \
          0x8000 .pio/build/sunton-2432s028r/partitions.bin \
          0x10000 .pio/build/sunton-2432s028r/firmware.bin
        cp .pio/build/sunton-2432s028r/firmware.bin release/degenbeat-sunton-2432s028r.bin
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-sunton
        path: release/*sunton*

  build-lcdwiki-s3:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        pip install platformio
    
    - name: Build LCDWiki ESP32-S3
      run: |
        pio run -e lcdwiki-esp32s3-28p
    
    - name: Create merged firmware
      run: |
        mkdir -p release
        esptool.py --chip esp32s3 merge-bin \
          -o release/degenbeat-lcdwiki-esp32s3-28p-merged.bin \
          --flash-mode dio --flash-size 16MB \
          0x0 .pio/build/lcdwiki-esp32s3-28p/bootloader.bin \
          0x8000 .pio/build/lcdwiki-esp32s3-28p/partitions.bin \
          0x10000 .pio/build/lcdwiki-esp32s3-28p/firmware.bin
        cp .pio/build/lcdwiki-esp32s3-28p/firmware.bin release/degenbeat-lcdwiki-esp32s3-28p.bin
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-lcdwiki-s3
        path: release/*lcdwiki*

  create-release:
    needs: [build-sunton, build-lcdwiki-s3]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release
        merge-multiple: true
    
    - name: List files
      run: ls -la release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*.bin
        generate_release_notes: true
        body: |
          ## DegenBeat Multi-Hardware Release
          
          ### Firmwares inclus
          - `degenbeat-sunton-2432s028r-merged.bin` - Pour Sunton ESP32-2432S028R (flash à l'offset 0x0)
          - `degenbeat-lcdwiki-esp32s3-28p-merged.bin` - Pour LCDWiki ESP32-S3 2.8inch (flash à l'offset 0x0)
          
          ### Flashage via WebFlasher
          Rendez-vous sur la page GitHub Pages du projet pour flasher directement depuis votre navigateur.
          
          ### Flashage manuel (utilisez les fichiers `-merged.bin`)
          ```bash
          # Pour Sunton
          esptool.py --chip esp32 --baud 921600 write_flash -z 0x0 degenbeat-sunton-2432s028r-merged.bin
          
          # Pour LCDWiki ESP32-S3
          esptool.py --chip esp32s3 --baud 921600 write_flash -z 0x0 degenbeat-lcdwiki-esp32s3-28p-merged.bin
          ```

  deploy-webflasher:
    needs: [build-sunton, build-lcdwiki-s3]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Download firmwares
      uses: actions/download-artifact@v4
      with:
        path: firmwares
        merge-multiple: true
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Prepare site
      run: |
        mkdir -p _site/firmwares
        cp firmwares/*-merged.bin _site/firmwares/
        cp firmwares/*.json _site/firmwares/
        cp -r webflasher/* _site/
    
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
