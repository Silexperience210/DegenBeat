; PlatformIO Multi-Hardware Configuration
; DegenBeat - Supporte plusieurs hardwares

[platformio]
default_envs = lcdwiki-esp32s3-28p

; ============================================
; HARDWARE 1: Sunton ESP32-2432S028R (Original)
; ============================================
[env:sunton-2432s028r]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Utiliser uniquement le dossier sunton/
src_filter = +<sunton/> -<lcdwiki/>

lib_deps = 
    bodmer/TFT_eSPI@^2.5.43
    paulstoffregen/XPT2046_Touchscreen
    bblanchon/ArduinoJson@^7.2.0
    ricmoo/QRCode@^0.0.1
    bitbank2/PNGdec@^1.1.6

build_flags = 
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_OFF=1
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTOUCH_CS=33
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DUSE_DMA_TO_TFT=1
    -DHARDWARE_SUNTON=1

; ============================================
; HARDWARE 2: LCDWiki ESP32-S3 2.8inch Display
; ============================================
[env:lcdwiki-esp32s3-28p]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

# Utiliser uniquement le dossier lcdwiki/
src_filter = +<lcdwiki/> -<sunton/>

board_build.partitions = default_16MB.csv

lib_deps = 
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/strange-v/FT6336U.git
    bblanchon/ArduinoJson@^7.2.0
    ricmoo/QRCode@^0.0.1
    bitbank2/PNGdec@^1.1.6
    fastled/FastLED@^3.6.0

build_flags = 
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=13
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    -DTFT_BL=45
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=80000000
    -DSPI_READ_FREQUENCY=40000000
    -DUSE_DMA_TO_TFT=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DSMOOTH_FONT=1
    -DTOUCH_SDA=16
    -DTOUCH_SCL=15
    -DTOUCH_RST=18
    -DTOUCH_IRQ=17
    -DRGB_LED_PIN=42
    -DHARDWARE_LCDWIKI_S3=1

upload_speed = 921600
