; PlatformIO Project Configuration File
; DegenBeat adapté pour LCDWiki ESP32-S3 2.8inch Display
; Hardware: ESP32-S3-N16R8 (16MB Flash, 8MB PSRAM)
; Display: ILI9341 240x320 (portrait)
; Touch: FT6336U capacitif (I2C)
; RGB LED: Single-line WS2812-style sur IO42

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Partition pour 16MB flash
board_build.partitions = default_16MB.csv

; PSRAM activé
build_flags = 
    -DUSER_SETUP_LOADED=1
    ; Driver ILI9341
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; Pins Display SPI
    -DTFT_MISO=13
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    -DTFT_BL=45
    -DTFT_BACKLIGHT_ON=HIGH
    ; Configuration SPI
    -DSPI_FREQUENCY=80000000
    -DSPI_READ_FREQUENCY=40000000
    -DUSE_DMA_TO_TFT=1
    ; Fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DSMOOTH_FONT=1
    ; Touch pins (I2C pour FT6336U)
    -DTOUCH_SDA=16
    -DTOUCH_SCL=15
    -DTOUCH_RST=18
    -DTOUCH_IRQ=17
    ; RGB LED pin
    -DRGB_LED_PIN=42

lib_deps = 
    bodmer/TFT_eSPI@^2.5.43
    ; Librairie pour touch FT6336U (I2C capacitif)
    https://github.com/strange-v/FT6336U.git
    bblanchon/ArduinoJson@^7.2.0
    ricmoo/QRCode@^0.0.1
    bitbank2/PNGdec@^1.1.6
    ; Librairie pour LED RGB single-line (WS2812 compatible)
    fastled/FastLED@^3.6.0

upload_speed = 921600
